<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Viagens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Gestão de Viagens</h1>
        </header>

        <div class="grid-layout">
            <section class="card form-section">
                <h2>Nova Viagem</h2>
                <form id="viagemForm">
                    <div class="input-group">
                        <label for="nome">Nome do Passageiro</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="input-group">
                        <label for="destino">Destino</label>
                        <input type="text" id="destino" required>
                    </div>
                    <div class="row">
                        <div class="input-group half">
                            <label for="dataIda">Data de Ida</label>
                            <input type="date" id="dataIda" required>
                        </div>
                        <div class="input-group half">
                            <label for="dataVolta">Data de Volta</label>
                            <input type="date" id="dataVolta" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="hotel">Nome do Hotel</label>
                        <input type="text" id="hotel" required>
                    </div>
                    <div class="row">
                        <div class="input-group half">
                            <label for="status">Status do Pagamento</label>
                            <select id="status" required>
                                <option value="Pendente">Pendente</option>
                                <option value="Pago">Pago</option>
                                <option value="Cancelado">Cancelado</option>
                            </select>
                        </div>
                        <div class="input-group half">
                            <label for="valor">Valor (R$)</label>
                            <input type="number" step="0.01" id="valor" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Cadastrar Viagem</button>
                </form>
            </section>

            <section class="card checklist-section">
                <h2>✅ Checklist de Tarefas</h2>
                <div class="checklist-input">
                    <input type="text" id="novaTarefa" placeholder="Adicionar nova tarefa...">
                    <button id="btnAdicionarTarefa" class="btn-secondary">+</button>
                </div>
                <ul id="listaTarefas">
                    </ul>
            </section>
        </div>

        <section class="card list-section">
            <div class="list-header">
                <h2>Viagens Cadastradas</h2>
                <button id="btnExportar" class="btn-excel">📊 Exportar para Excel</button>
            </div>
            <div class="table-responsive">
                <table id="tabelaViagens">
                    <thead>
                        <tr>
                            <th>Passageiro</th>
                            <th>Destino</th>
                            <th>Ida</th>
                            <th>Volta</th>
                            <th>Hotel</th>
                            <th>Status</th>
                            <th>Valor</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
