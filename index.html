<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyEasy | Gestão de Viagens</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>✈️ <span>FlyEasy</span></h1>
            </div>
            <button id="btnTema" class="btn-tema" type="button" aria-label="Ativar modo escuro">🌙</button>
        </header>

        <div class="grid-layout">
            <section class="card form-section">
                <h2>Nova Viagem</h2>
                <form id="viagemForm">
                    <div class="input-group">
                        <label for="nome">Nome do Passageiro</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="input-group">
                        <label for="destino">Destino</label>
                        <input type="text" id="destino" required>
                    </div>
                    <div class="row">
                        <div class="input-group half">
                            <label for="dataIda">Data de Ida</label>
                            <input type="date" id="dataIda" required>
                        </div>
                        <div class="input-group half">
                            <label for="dataVolta">Data de Volta</label>
                            <input type="date" id="dataVolta" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="hotel">Nome do Hotel</label>
                        <input type="text" id="hotel" required>
                    </div>
                    <div class="row">
                        <div class="input-group half">
                            <label for="status">Status do Pagamento</label>
                            <select id="status" required>
                                <option value="Pendente">Pendente</option>
                                <option value="Pago">Pago</option>
                                <option value="Cancelado">Cancelado</option>
                            </select>
                        </div>
                        <div class="input-group half">
                            <label for="valor">Valor (R$)</label>
                            <input type="number" step="0.01" id="valor" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Cadastrar Viagem</button>
                </form>
            </section>

            <section class="card checklist-section">
                <h2>Checklist de Tarefas</h2>
                <div class="checklist-input">
                    <input type="text" id="novaTarefa" placeholder="Adicionar nova tarefa...">
                    <button type="button" id="btnAdicionarTarefa" class="btn-secondary">+</button>
                </div>
                <ul id="listaTarefas">
                </ul>
            </section>
        </div>

        <section class="card list-section">
            <div class="list-header">
                <h2>Viagens Cadastradas</h2>
            </div>
            <div class="table-responsive">
                <table id="tabelaViagens">
                    <thead>
                        <tr>
                            <th>Passageiro</th>
                            <th>Destino</th>
                            <th>Ida</th>
                            <th>Volta</th>
                            <th>Hotel</th>
                            <th>Status</th>
                            <th>Valor</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>
        <footer class="taskbar">
            <div class="taskbar-content">
                <div class="taskbar-title">
                    Ações do Sistema
                </div>
                <div class="taskbar-buttons">
                    <button id="btnExportarFooter" class="btn-excel">
                        Exportar para Excel
                    </button>
                    <button id="btnReiniciar" class="btn-danger">
                        Reiniciar
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
