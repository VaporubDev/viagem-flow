<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyEasy | Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <script>
        if (localStorage.getItem('excel_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
    
    <div class="container">
        <header class="dashboard-header">
            <div class="header-content">
                <h1>📊 <span>FlyEasy Dashboard</span></h1>
                <a href="index.html" class="btn-dashboard">Voltar para Viagens</a>
            </div>
            <button id="btnTema" class="btn-tema" type="button" aria-label="Ativar modo escuro">🌙</button>
        </header>

        <div class="dashboard-grid">
            <div class="card metric-card">
                <div class="metric-icon">💰</div>
                <div class="metric-info">
                    <h3>Total Investido</h3>
                    <p id="valTotalInvestido">Carregando...</p>
                </div>
            </div>

            <div class="card metric-card">
                <div class="metric-icon">⏳</div>
                <div class="metric-info">
                    <h3>Viagens Pendentes</h3>
                    <p id="valPendentes">Carregando...</p>
                </div>
            </div>

            <div class="card metric-card">
                <div class="metric-icon">🗺️</div>
                <div class="metric-info">
                    <h3>Destino Mais Visitado</h3>
                    <p id="valDestinoMaisVisitado">Carregando...</p>
                </div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="card chart-card">
                <h2>Status dos Pagamentos</h2>
                <div class="chart-container">
                    <canvas id="chartStatus"></canvas>
                </div>
            </div>

            <div class="card chart-card">
                <h2>Gastos por Destino</h2>
                <div class="chart-container">
                    <canvas id="chartGastosDestino"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
